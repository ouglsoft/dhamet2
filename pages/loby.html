<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />

  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://dhamet2.ouglsoft.com/pages/loby.html" />

  <title data-i18n="lobby.title">قائمة الغرف واللاعبين المتصلين</title>
    <link rel="icon" type="image/webp" href="../assets/icons/icon.webp" />


<link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css?v=20260627-fix1" />
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-database-compat.js"></script>
  <script src="../js/firebase.config.js"></script>
  <script src="../js/emergency-shell.js"></script>

  <script src="../js/i18n.js?v=20260627-fix1"></script>
<script src="../js/modal.js"></script>

  <script src="../js/online.passive.js"></script>
  <script src="../js/online.js"></script>



<link rel="stylesheet" href="../css/mobile.css?v=20260701-invite-mobile1" />
</head>
<body>
  <main class="z-page z-lobby-page z-vcenter">
    <div class="z-page-inner z-lobby-inner">
      <div class="z-emergency-banner">نظام اللعب الاحتياطي — جلسات مجهولة ومباريات غير مصنفة</div>
      <div id="emergencyAuthStatus" class="z-emergency-auth" aria-live="polite"></div>
      <div class="z-lobby-head">
        <div class="z-lobby-head-left" aria-hidden="true"></div>
<div class="z-lobby-head-center">
          <h1 class="z-page-title" data-i18n="lobby.title">قائمة الغرف واللاعبين المتصلين</h1>
          <p class="z-lobby-subtitle" data-i18n="lobby.subtitle">اختر غرفة للمشاهدة أو دعوة لاعب لبدء مباراة.</p>
        </div>

        <div class="z-lobby-head-right" aria-hidden="true"></div>
      </div>

      <div class="z-lobby-cols">
        <section class="z-lobby-panel" data-i18n-aria-label="aria.lobbyRooms">
          <h2 class="z-lobby-h2" data-i18n="lobby.rooms">الغرف</h2>
          <div id="roomsList" class="z-lobby-list rooms">
            <div class="z-empty z-loading" data-i18n="lobby.loadingRooms">جاري تحميل قائمة الغرف المباشرة...</div>
          </div>
        </section>

        <section class="z-lobby-panel" data-i18n-aria-label="aria.lobbyPlayers">
          <h2 class="z-lobby-h2" data-i18n="online.playersTitle">اللاعبون المتصلون</h2>
          <div id="playersList" class="z-lobby-list players">
            <div class="z-empty z-loading" data-i18n="lobby.loadingPlayers">جاري تحميل قائمة اللاعبين المتصلين.....</div>
          </div>
        </section>
      </div>

      <div class="z-lobby-bottom">
        <div id="inviteReceiveToggleRow" class="z-invite-receive-row" data-online-invite-toggle="1">
          <span class="z-invite-receive-label" data-i18n="online.invites.receiveLabel">استقبال الدعوات:</span>
          <button id="btnInviteReceiveToggle" class="z-invite-receive-toggle" type="button" aria-pressed="true">
            <span data-invite-toggle-state data-i18n="online.invites.enabled">مفعل</span>
          </button>
        </div>
        <a class="btn small primary z-lobby-back" href="https://ouglsoft.com/dhamet/pages/mode.html">
          <img class="btn-ico" src="../assets/icons/chevron-left.svg" alt="" aria-hidden="true" />
          <span data-i18n="lobby.backToMode">العودة إلى اختيار نمط اللعب</span>
        </a>
      </div>
    </div>
  </main>

  <div id="zModalRoot" style="display:none"></div>
<script src="../js/mobile.js?v=20260701-invite-mobile1"></script>
</body>
</html>
