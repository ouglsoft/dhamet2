  <body class="z-page-body z-home-page z-game-page mode-pvp">
    <div class="z-emergency-banner z-emergency-banner-game">نظام احتياطي — المباراة غير مصنفة</div>
    <div class="app">
<section class="board-wrap" data-i18n-aria-label="aria.board">
        <canvas id="board" width="1125" height="900"></canvas>
        <div id="board3d" aria-hidden="true"></div>
</section>

      <aside class="side">
<div class="status-row">
          <div id="statusText" class="status">
            <img id="turnPawn" class="turn-pawn" src="../assets/icons/pawn-black.svg" alt="" aria-hidden="true" />
            <span id="statusTextMsg">...</span>
          </div>
        </div>

        <div class="stats">
          <div class="stats-desktop">
            <table>
              <thead>
                <tr>
                  <th data-i18n="ui.stats">الإحصائيات</th>
                  <th><span class="player-head stats-piece-head"><span class="stats-piece-frame is-black-piece"><img class="stats-piece-icon" src="../assets/icons/pawn-black.svg" alt="" aria-hidden="true" /></span><span id="pTopName" class="sr-only">—</span></span></th>
                  <th><span class="player-head stats-piece-head"><span class="stats-piece-frame is-white-piece"><img class="stats-piece-icon" src="../assets/icons/pawn-white.svg" alt="" aria-hidden="true" /></span><span id="pBotName" class="sr-only">—</span></span></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td data-i18n="stats.left">القطع المتبقية</td>
                  <td id="topLeft">40</td>
                  <td id="botLeft">40</td>
                </tr>
                <tr>
                  <td data-i18n="stats.kings">الظائم(الملك)</td>
                  <td id="topKings">0</td>
                  <td id="botKings">0</td>
                </tr>
                <tr>
                  <td data-i18n="stats.captured">المأسورة</td>
                  <td id="topCaptured">0</td>
                  <td id="botCaptured">0</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="stats-mobile" data-i18n-aria-label="aria.mobileStats">
            <table class="stats-mobile-table">
              <thead>
                <tr>
                  <th data-i18n="ui.stats">الإحصائيات</th>
                  <th class="stats-color-head">
                    <span class="stats-piece-frame is-black-piece"><img class="stats-piece-icon piece-ico" src="../assets/icons/pawn-black.svg" alt="" aria-hidden="true" /></span>
                    <span id="pTopNameM" class="sr-only">—</span>
                  </th>
                  <th class="stats-color-head">
                    <span class="stats-piece-frame is-white-piece"><img class="stats-piece-icon piece-ico" src="../assets/icons/pawn-white.svg" alt="" aria-hidden="true" /></span>
                    <span id="pBotNameM" class="sr-only">—</span>
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td data-i18n="stats.left">القطع المتبقية</td>
                  <td id="topLeftM">40</td>
                  <td id="botLeftM">40</td>
                </tr>
                <tr>
                  <td data-i18n="stats.kings">الظائم(الملك)</td>
                  <td id="topKingsM">0</td>
                  <td id="botKingsM">0</td>
                </tr>
                <tr>
                  <td data-i18n="stats.captured">المأسورة</td>
                  <td id="topCapturedM">0</td>
                  <td id="botCapturedM">0</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

          <div id="onlinePresence" class="online-box" style="display:none;" aria-live="polite"></div>

          <div class="timer-row">
            <div class="clock"><span class="muted">⏱</span><span id="killClock">00:00</span></div>
            <button id="btnEndKill" class="btn ok keep-text" type="button" aria-label="إنهاء الأخذ">
              <img src="../assets/icons/end-kill.svg" alt="" width="22" height="22" aria-hidden="true">
              <span data-i18n="game.endKill">إنهاء الأخذ</span>
            </button>
          </div>

          <div class="soufla-row">
            <button id="btnSoufla" class="btn danger keep-text" type="button" aria-label="الصوفلة">
              <img src="../assets/icons/soufla.svg" alt="" width="22" height="22" aria-hidden="true">
              <span data-i18n="game.soufla">الصوفلة</span>
            </button>
          </div>

          <div id="controlsWrap" class="controls-wrap">
            <div id="pvpControlsBox" class="controls-box controls-pvp" aria-label="أدوات اللعب عبر الإنترنت">
              <div id="pvpRow1" class="pvp-row"></div>
              <div id="pvpRow2" class="pvp-row"></div>
              <div id="pvpRow3" class="pvp-row"></div>
            </div>

          <div id="controlsPool" class="controls-pool" aria-hidden="true">

            <button id="btnUndo" class="btn keep-text">
              <img src="../assets/icons/undo.svg" alt="تراجع" data-i18n-alt="buttons.undo" class="btn-ico" />
              <span data-i18n="buttons.undo" class="btn-text">تراجع</span>
            </button>

            <button id="btnSettings" class="btn keep-text">
              <img src="../assets/icons/settings.svg" alt="الإعدادات" data-i18n-alt="buttons.settings" class="btn-ico" />
              <span data-i18n="buttons.settings" class="btn-text">إعدادات</span>
            </button>

            <button id="btnEndOnline" class="btn end">
              <img src="../assets/icons/end-match.svg" alt="خروج" data-i18n-alt="buttons.endMatch" class="btn-ico" />
              <span data-i18n="buttons.endMatch" class="btn-text">خروج</span>
            </button>

            <div id="syncControlWrap" class="sync-control-wrap">
              <div id="syncIssueNotice" class="sync-issue-notice" hidden aria-live="polite"></div>
              <button id="btnSync" class="btn keep-text">
                <img src="../assets/icons/refresh.svg" alt="تحديث" data-i18n-alt="buttons.sync" class="btn-ico" />
                <span data-i18n="buttons.sync" class="btn-text">تحديث</span>
              </button>
            </div>

            <button id="btnChat" class="btn keep-text">
              <img src="../assets/icons/chat.svg" alt="الدردشة الكتابية" data-i18n-alt="pvp.chat.open" class="btn-ico" />
              <span data-i18n="pvp.chat.open" class="btn-text">الدردشة الكتابية</span>
            </button>
          </div>
        </div>
        <div id="specBar" class="spec-bar" style="display: none">
          <button id="btnLeaveRoom" class="btn end">
            <img src="../assets/icons/leave.svg" alt="مغادرة الغرفة" data-i18n-alt="pvp.leave" class="btn-ico" />
            <span data-i18n="pvp.leave" class="btn-text">مغادرة الغرفة</span>
          </button>

        </div>

        <div
          id="log"

          class="log"
          aria-live="polite"
          data-i18n-aria-label="aria.activityLog"
        ></div>
</aside>
    </div>
